<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270" width="480" height="270" role="img" aria-label="Illustration code de la route : écran de révision et panneau">
  <defs>
    <linearGradient id="codeBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3730a3"/>
      <stop offset="0.55" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="480" height="270" fill="url(#codeBg)"/>
  <circle cx="86" cy="74" r="54" fill="#ffffff" opacity="0.10"/>
  <!-- tablette / écran -->
  <g transform="translate(150 52)">
    <rect x="0" y="0" width="190" height="132" rx="16" fill="#0f172a" opacity="0.35"/>
    <rect x="8" y="8" width="174" height="116" rx="10" fill="#f8fafc"/>
    <rect x="22" y="24" width="100" height="12" rx="6" fill="#c7d2fe"/>
    <rect x="22" y="46" width="146" height="9" rx="4" fill="#e2e8f0"/>
    <rect x="22" y="62" width="120" height="9" rx="4" fill="#e2e8f0"/>
    <!-- bonne réponse cochée -->
    <circle cx="34" cy="92" r="11" fill="#22c55e"/>
    <path d="M29 92 l4 4 l8 -9" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="52" y="86" width="110" height="12" rx="6" fill="#dcfce7"/>
    <rect x="92" y="150" width="6" height="14" fill="#0f172a" opacity="0.3"/>
    <rect x="60" y="164" width="70" height="8" rx="4" fill="#0f172a" opacity="0.3"/>
  </g>
  <!-- panneau stop -->
  <g transform="translate(70 120)">
    <rect x="20" y="44" width="8" height="70" fill="#cbd5e1"/>
    <polygon points="24,6 44,16 54,36 54,58 44,78 24,88 4,78 -6,58 -6,36 4,16" transform="translate(0 -2) scale(0.92)" fill="#ef4444" stroke="#ffffff" stroke-width="3"/>
    <text x="22" y="50" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">STOP</text>
  </g>
</svg>
